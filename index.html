:root {
  --bg:      #0e0c09;
  --gold:    #c2a050;
  --gold-l:  #e5d090;
  --gold-d:  #886828;
  --env:     #f5e7c8;
  --env2:    #ead8a8;
  --env3:    #ddc490;
  --mask:    #edddb8;
  --paper:   #faf7ee;
  --ink:     #1c1208;
  --ink-m:   #4a3518;
  --seal:    #b01818;
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html,body { width:100%; height:100%; overflow:hidden; background:var(--bg); }
body {
  display:flex; align-items:center; justify-content:center;
  font-family:'NotoSerifSC','Songti SC','STSong',serif;
  -webkit-font-smoothing:antialiased;
}

/* ──────────── BOKEH ──────────── */
#bokeh { position:fixed; inset:0; z-index:0; pointer-events:none; }

/* ──────────── SCENE-ENV ──────────── */
#scene-env {
  position:relative; z-index:1;
  display:flex; flex-direction:column; align-items:center; gap:28px;
}

/* 3-D perspective wrapper */
.env-persp { perspective:1400px; perspective-origin:50% 35%; }

/* ── ENVELOPE SCENE BOX (560×370) ── */
.env-scene {
  position:relative;
  width:560px; height:370px;
  cursor:pointer;
}
.env-scene:hover .env-back { filter:brightness(1.03); }

/* z=1  Envelope back body */
.env-back {
  position:absolute; inset:0; z-index:1;
  background:linear-gradient(162deg,#f8ebd4 0%,#f0ddb4 55%,#e4c888 100%);
  border-radius:2px;
  box-shadow:
    0 2px 4px rgba(0,0,0,.12),
    0 8px 20px rgba(0,0,0,.28),
    0 20px 60px rgba(0,0,0,.50),
    0 50px 120px rgba(0,0,0,.65);
  transition:filter .4s;
}

/* Subtle inner crease lines via SVG overlay */
.env-creases {
  position:absolute; inset:0; z-index:2; pointer-events:none;
}

/* z=2  Letter peek – paper that rises from inside */
.env-peek {
  position:absolute;
  top:32px; left:30px;
  width:500px; height:295px;
  z-index:2;
  background:linear-gradient(180deg,#faf8ee 0%,#f5f0e2 100%);
  box-shadow:0 2px 8px rgba(0,0,0,.10);
  border-top:1px solid rgba(190,160,90,.2);
  display:flex; flex-direction:column; align-items:center;
  padding-top:22px; gap:6px;
  transform:translateY(0);
  transition:transform 1.15s cubic-bezier(0.22,1,0.36,1);
}
.env-peek-orn { font-size:14px; letter-spacing:14px; color:var(--gold-d); opacity:.55; }
.env-peek-title { font-size:18px; letter-spacing:8px; color:var(--ink); font-weight:700; }
.env-peek-sub { font-size:11px; letter-spacing:3px; color:var(--ink-m); opacity:.7; }

/* z=3  Interior mask – hides lower portion of rising letter */
.env-mask {
  position:absolute;
  left:0; right:0; top:195px; bottom:0;
  z-index:3;
  background:linear-gradient(180deg,#edddb4 0%,#e5ce98 100%);
}

/* z=4  Envelope face – decorations, fades out on open */
.env-face {
  position:absolute; inset:0; z-index:4;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:24px;
  transition:opacity .85s ease;
}
.env-scene.opening .env-face { opacity:0; pointer-events:none; }

.ef-orn { font-size:16px; letter-spacing:16px; color:var(--gold-d); opacity:.65; margin-bottom:8px; }
.ef-rule {
  width:210px; height:.5px;
  background:linear-gradient(to right,transparent,var(--gold-d),transparent);
  opacity:.5; margin:7px 0;
}
.ef-yr { font-size:12px; letter-spacing:6px; color:var(--ink-m); font-weight:300; }
.ef-title { font-size:26px; letter-spacing:10px; color:var(--ink); font-weight:700; margin:9px 0 3px; }
.ef-to { font-size:11px; letter-spacing:5px; color:var(--ink-m); font-weight:300; margin-top:12px; }
.ef-name {
  font-family:'Cormorant Garamond','Georgia',serif;
  font-size:30px; font-style:italic; font-weight:300;
  color:var(--ink); letter-spacing:3px; margin-top:5px;
}

/* Wax seal */
.env-seal {
  position:absolute; bottom:22px; right:26px; z-index:5;
  width:54px; height:54px; border-radius:50%;
  background:
    radial-gradient(circle at 36% 30%,#e03535 0%,#a81818 42%,#701010 72%,#3c0808 100%);
  box-shadow:
    0 3px 14px rgba(100,0,0,.60),
    inset 0 1px 3px rgba(255,255,255,.18),
    inset 0 -2px 5px rgba(0,0,0,.45);
  display:flex; align-items:center; justify-content:center;
}
.env-seal svg { width:36px; height:36px; }

/* z=5  Flap – opens on click */
.env-flap {
  position:absolute; top:0; left:0; z-index:5;
  width:560px; height:205px;
  transform-origin:center top;
  filter:drop-shadow(0 6px 16px rgba(0,0,0,.32));
  transition:transform 1.65s cubic-bezier(0.37,0,0.63,1);
  backface-visibility:hidden;
}
.env-scene.opening .env-flap {
  transform:perspective(1400px) rotateX(-180deg);
}

/* Click hint */
.click-hint {
  font-size:12px; letter-spacing:5px;
  color:rgba(194,160,80,.52);
  animation:hint-float 2.8s ease-in-out infinite;
}
@keyframes hint-float {
  0%,100%{opacity:.3;transform:translateY(0)}
  50%{opacity:.88;transform:translateY(-7px)}
}

/* ──────────── SCENE-LETTER ──────────── */
#scene-letter {
  position:fixed; inset:0; z-index:50;
  background:rgba(10,8,5,.97);
  overflow-y:auto; overflow-x:hidden;
  padding:64px 20px 120px;
  display:flex; justify-content:center;
  opacity:0; pointer-events:none;
  transition:opacity .9s ease;
}
#scene-letter.show { opacity:1; pointer-events:all; }

/* ── LETTER PAPER ── */
.ltr-paper {
  position:relative;
  width:720px; max-width:95vw;
  background:var(--paper);
  padding:72px 80px 0;
  box-shadow:
    0 0 0 .5px rgba(190,155,80,.14),
    0 50px 120px rgba(0,0,0,.65),
    0 20px 50px rgba(0,0,0,.45),
    0 6px 18px rgba(0,0,0,.30);
  opacity:0; transform:translateY(28px) scale(.97);
  transition:opacity .95s ease, transform .95s ease;
}
.ltr-paper.show { opacity:1; transform:none; }

/* Double inner border */
.ltr-paper::before {
  content:''; position:absolute;
  top:18px;left:18px;right:18px;bottom:18px;
  border:.5px solid rgba(190,155,80,.22);
  pointer-events:none;
}
.ltr-paper::after {
  content:''; position:absolute;
  top:22px;left:22px;right:22px;bottom:22px;
  border:.5px solid rgba(190,155,80,.09);
  pointer-events:none;
}

/* Corner ornaments */
.corner { position:absolute; z-index:2; font-size:13px; color:rgba(190,155,80,.28); line-height:1; }
.corner-tl { top:24px; left:24px; }
.corner-tr { top:24px; right:24px; transform:scaleX(-1); }
.corner-bl { bottom:24px; left:24px; transform:scaleY(-1); }
.corner-br { bottom:24px; right:24px; transform:scale(-1,-1); }

/* ── LETTER HEADER ── */
.ltr-head {
  text-align:center;
  padding-bottom:28px; margin-bottom:34px;
  border-bottom:.5px solid rgba(190,155,80,.20);
}
.ltr-head-orn {
  display:block; font-family:'Georgia',serif;
  font-size:18px; letter-spacing:18px; color:var(--gold-d);
  opacity:.60; margin-bottom:12px;
}
.ltr-head-title {
  font-size:22px; letter-spacing:9px; font-weight:700; color:var(--ink);
  margin-bottom:7px;
}
.ltr-head-rule {
  width:260px; height:.5px; margin:8px auto;
  background:linear-gradient(to right,transparent,rgba(190,155,80,.38),transparent);
}
.ltr-head-sub {
  font-size:11px; letter-spacing:3px; color:var(--ink-m);
  font-weight:300; opacity:.72;
}

/* ── LETTER BODY TEXT ── */
#ltr-body {
  font-size:15.5px; line-height:2.5;
  color:var(--ink); font-weight:300;
}
.l-greeting { display:block; font-size:17px; font-weight:400; margin-bottom:26px; }
.l-p { display:block; text-indent:2em; margin-bottom:19px; }
.l-poem {
  display:block; text-indent:0; text-align:center;
  margin:34px auto; font-size:17px; line-height:3.4;
  font-style:italic; color:#2e1c08; font-weight:300;
}
.l-closing { display:block; text-indent:0; text-align:right; margin-top:32px; font-size:17px; font-weight:400; }

/* character fade-in */
.c {
  display:inline-block;
  opacity:0; transform:translateY(7px);
  transition:opacity 1.1s cubic-bezier(.25,.46,.45,.94),
              transform 1.1s cubic-bezier(.25,.46,.45,.94);
  will-change:opacity,transform;
}
.c.v { opacity:1; transform:none; }

/* ── LETTER END: photo integrated with closing ── */
#ltr-end {
  position:relative;
  margin-top:44px;
  display:flex;
  align-items:flex-end;
  gap:0;
  padding-bottom:80px;
}

/* Left side: stamp + closing text */
#ltr-left {
  flex:1; display:flex; flex-direction:column;
  align-items:flex-start; justify-content:flex-end;
  padding-bottom:10px; gap:28px; padding-right:24px;
  position:relative; z-index:3;
}

/* Photo – right side, tall, overlaps closing area */
#photo-frame {
  flex:0 0 264px; position:relative; z-index:1;
  margin-bottom:-64px;  /* extends below paper bottom */
  opacity:0;
  transform:translateX(20px) rotate(1.8deg);
  transform-origin:bottom right;
  transition:opacity 1.1s ease, transform 1.1s cubic-bezier(.25,.46,.45,.94);
}
#photo-frame.show {
  opacity:1; transform:translateX(0) rotate(1.8deg);
}

/* Gold mat frame */
#photo-frame::before {
  content:''; position:absolute;
  inset:-11px; z-index:-1;
  background:linear-gradient(145deg,
    #b08838 0%,#e0c860 25%,#c4a045 50%,#dcc458 75%,#907025 100%);
  box-shadow:0 24px 60px rgba(0,0,0,.55), 0 8px 20px rgba(0,0,0,.35);
}
/* White inner mat */
#photo-frame::after {
  content:''; position:absolute; inset:-3px; z-index:0;
  background:var(--paper);
}

#photo-img {
  display:block; position:relative; z-index:1;
  width:100%; aspect-ratio:2/3; object-fit:cover; object-position:center 12%;
}
.photo-cap {
  position:absolute; bottom:-22px; left:50%; z-index:2;
  transform:translateX(-50%) rotate(-1.8deg);
  font-family:'Georgia',serif; font-size:11px; letter-spacing:3px;
  color:rgba(194,160,80,.58); white-space:nowrap;
}

/* ── STAMP ── */
#stamp {
  width:96px; height:96px; border-radius:50%;
  background:
    radial-gradient(circle at 38% 30%,#d43232 0%,#961414 44%,#620c0c 72%,#380808 100%);
  border:2px solid rgba(175,35,35,.62);
  box-shadow:
    0 0 0 1px rgba(175,35,35,.22),
    0 8px 24px rgba(100,0,0,.55),
    inset 0 1px 2px rgba(255,255,255,.18);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  color:rgba(255,255,255,.88); text-align:center; line-height:1.72;
  transform:rotate(-17deg);
  font-weight:300;
  animation:stamp-fall .48s cubic-bezier(.175,.885,.32,1.275) both;
  animation-play-state:paused;
}
#stamp.go { animation-play-state:running; }
@keyframes stamp-fall {
  0%   {transform:rotate(-17deg) scale(3.5);opacity:0}
  58%  {transform:rotate(-17deg) scale(.88);opacity:1}
  78%  {transform:rotate(-17deg) scale(1.09)}
  100% {transform:rotate(-17deg) scale(1);opacity:1}
}
/* SVG inside stamp */
#stamp svg { width:66px; height:66px; }

/* ── MUSIC BUTTON ── */
#music-btn {
  position:fixed; top:22px; right:22px; z-index:200;
  width:40px; height:40px; border-radius:50%;
  background:rgba(194,160,80,.08);
  border:1px solid rgba(194,160,80,.20);
  color:rgba(194,160,80,.58); font-size:16px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  backdrop-filter:blur(10px); transition:all .35s;
  font-family:inherit;
}
#music-btn:hover { background:rgba(194,160,80,.18); color:var(--gold); }
#music-btn.on { color:var(--gold); border-color:rgba(194,160,80,.45); background:rgba(194,160,80,.14); }

/* ── SCROLL HINT ── */
#shint {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  z-index:200; display:none;
  font-family:'Georgia',serif; font-size:13px; letter-spacing:4px;
  color:rgba(194,160,80,.40); animation:hint-float 3s ease-in-out infinite;
}
#shint.show { display:block; }
</style>
</head>

<script>
/* ══ BOKEH ══ */
const BV = document.getElementById('bokeh');
const BX = BV.getContext('2d');
let BP = [];
function initBokeh() {
  BV.width = innerWidth; BV.height = innerHeight;
  BP = Array.from({length:68}, () => {
    const r = Math.random()*24 + 4;
    return {
      x: Math.random()*BV.width, y: Math.random()*BV.height, r,
      vy: -(Math.random()*.16+.04), vx: (Math.random()-.5)*.07,
      a: Math.random()*.17+.03, ph: Math.random()*Math.PI*2,
      sp: Math.random()*.005+.002
    };
  });
}
function drawBokeh() {
  BX.clearRect(0,0,BV.width,BV.height);
  const t = Date.now()*.001;
  BP.forEach(p => {
    const a = p.a * (.5+.5*Math.sin(t*p.sp*60+p.ph));
    const g = BX.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
    g.addColorStop(0,   `rgba(196,162,82,${a*.88})`);
    g.addColorStop(.45, `rgba(196,162,82,${a*.35})`);
    g.addColorStop(1,   'rgba(196,162,82,0)');
    BX.beginPath(); BX.arc(p.x,p.y,p.r,0,Math.PI*2);
    BX.fillStyle = g; BX.fill();
    p.x += p.vx; p.y += p.vy;
    if (p.y+p.r < 0)  { p.y = BV.height+p.r; p.x = Math.random()*BV.width; }
    if (Math.abs(p.x) > BV.width+p.r) p.x = Math.random()*BV.width;
  });
  requestAnimationFrame(drawBokeh);
}
addEventListener('resize', initBokeh);
initBokeh(); drawBokeh();

/* ══ ENVELOPE ══ */
let envDone = false;
function openEnv() {
  if (envDone) return;
  envDone = true;
  if (!playing) startMusic();

  const scene = document.getElementById('env');
  scene.style.cursor = 'default';
  scene.classList.add('opening');

  // Disable onclick
  scene.onclick = null;

  // Phase 1: flap opens (1.65s) + face fades (0.85s after 0.65s)
  // Phase 2: peek rises (after 1.15s)
  // Phase 3: envelope fades (after 2.2s)
  // Phase 4: go to letter (after 3.0s)

  setTimeout(() => {
    // Letter peek starts rising
    document.getElementById('env-peek').style.transform = 'translateY(-215px)';
  }, 1150);

  setTimeout(() => {
    // Whole envelope wrapper fades
    const se = document.getElementById('scene-env');
    se.style.transition = 'opacity .75s ease';
    se.style.opacity = '0';
  }, 2250);

  setTimeout(goToLetter, 3050);
}

function goToLetter() {
  document.getElementById('scene-env').style.display = 'none';
  const sl = document.getElementById('scene-letter');
  sl.classList.add('show');
  const lp = document.getElementById('ltr-paper');
  setTimeout(() => {
    lp.classList.add('show');
    setTimeout(revealLetter, 980);
  }, 100);
}

/* ══ TEXT REVEAL ══ */
const LETTER = [
  {t:'greeting', s:'亲爱的 Yunlin，'},
  {t:'p', s:'今天对你来说，是一个尤其重要的日子。'},
  {t:'p', s:'我想，毕业从来都不只是"完成了一段学业"这么简单。它更像是，你终于走过了一段很长很长的路，回头看的时候，才发现自己已经翻过了那么多座山。'},
  {t:'p', s:'这两年的时间，我看到过你悲伤无助的样子，看到过你痛苦挣扎的样子。我看你如何在痛苦中，一步一步，勇敢地往前走；看你一次次摇摆，却仍然选择回到自己的初心。我也和你一起，见证了你的成就，见证了你的喜悦，见证了你慢慢长成今天这个更坚定、更柔软，也更有力量的人。'},
  {t:'p', s:'还记得你写下的那些"日记"。站在那个时间的窗口里，满眼都是绝望和悲伤，甚至不知道自己该怎样熬过那漫长的几个月。那时候的你，或许也不会想到，今天的你，真的会站在这里，穿着毕业袍，被爱包围着，带着笑意，迎接属于你的这一刻。'},
  {t:'p', s:'所以今天，请一定要为自己骄傲。不是因为你"撑过来了"，而是因为你在那些最难的时候，没有放弃自己。'},
  {t:'p', s:'你说，除了我，还有你的咨询师陪你走过了这艰难的时光。但其实，陪着你的，从来不只是我们。'},
  {t:'p', s:'从最开始的痛苦无助，到慢慢开始尝试理解美国人，慢慢了解美国的 small talk，了解美国一些的文化，到更多地了解自己，这些都是你成长的印记，这些印记一直陪着你。'},
  {t:'p', s:'它们不会消失。它们会留在你身上，陪着你往前走，提醒你，你曾经这样勇敢过。'},
  {t:'p', s:'你认识了几十个来访，他们或让你一起落泪，或让你深刻共振，或让你久久记挂。你看着他们的蜕变，他们也见证着你的成长。你陪他们走过一段路，而他们，也以自己的方式，陪你走过了一段路。'},
  {t:'p', s:'这些相遇，这些印记，这些你认真触碰过的生命，都会陪着你，走向更远的未来。'},
  {t:'p', s:'未来的路还很长。去成为你想成为的大人，去找到更多的深刻链接，去体验更丰富的人生，去继续追逐你理想中的未来。'},
  {t:'p', s:'同时也请记住，你也不用很急着去成为谁。你的存在本身，就已经很有意义。你的快乐，是最重要的事。'},
  {t:'poem', s:'是流星赞美了黑夜，\n鲸鱼安慰了大海\n\n而你的存在，\n本身就是这个世界\n很美好的一部分。'},
  {t:'closing', s:'毕业快乐，Yunlin'},
];

function revealLetter() {
  const box = document.getElementById('ltr-body');
  const left = document.getElementById('ltr-left');
  let delay = 0;
  const elems = [];

  LETTER.forEach((sec, si) => {
    const tag = sec.t === 'p' ? 'p' : 'span';
    const el = document.createElement(tag);
    el.className = 'l-' + sec.t;
    // append to body or left panel for closing
    const target = (sec.t === 'closing') ? left : box;

    setTimeout(() => target.appendChild(el), delay);
    delay += 40;

    [...sec.s].forEach(ch => {
      const d = delay;
      delay += charDelay(ch);
      setTimeout(() => {
        if (ch === '\n') { el.appendChild(document.createElement('br')); return; }
        if (ch === ' ')  { el.appendChild(document.createTextNode(' ')); return; }
        const sp = document.createElement('span');
        sp.className = 'c'; sp.textContent = ch;
        el.appendChild(sp);
        requestAnimationFrame(() => requestAnimationFrame(() => {
          sp.classList.add('v');
          if (si >= LETTER.length - 3)
            sp.scrollIntoView({behavior:'smooth', block:'nearest'});
        }));
      }, d);
    });

    delay += (sec.t === 'poem') ? 560 : (sec.t === 'greeting' ? 400 : 780);
  });

  // Show footer elements after all text
  setTimeout(() => {
    document.getElementById('photo-frame').classList.add('show');
  }, delay + 200);
  setTimeout(() => {
    document.getElementById('stamp').classList.add('go');
    document.getElementById('shint').classList.add('show');
  }, delay + 900);
}

function charDelay(ch) {
  if (ch === ' ')            return 28;
  if ('，；'.includes(ch))  return 265;
  if ('。！？'.includes(ch)) return 440;
  if (ch === '\n')           return 190;
  if ('——…'.includes(ch))   return 90;
  return 82;
}

const MEL = [
  // ── Section A (32b) ──
  [Db5,1.5,.68],[B4,.5,.62],[A4,2,.64],
  [A4,1,.60],[B4,1,.63],[Db5,2,.67],
  [E5,2,.73],[D5,1,.67],[Db5,1,.64],
  [B4,3,.64],[A4,1,.59],
  [Gb4,.5,.57],[A4,.5,.61],[Db5,2,.66],[B4,1,.62],
  [A4,3,.61],[Db5,1,.64],
  [D5,1,.64],[Db5,1,.62],[B4,2,.62],
  [A4,4,.57],

  // ── Section A' (32b) ──
  [Db5,1,.66],[E5,1,.70],[D5,2,.68],
  [Db5,2,.68],[B4,1,.63],[A4,1,.61],
  [B4,1,.62],[Db5,1,.66],[E5,2,.70],
  [Db5,4,.66],
  [Gb5,2,.76],[E5,1,.70],[D5,1,.66],
  [Db5,2,.68],[B4,2,.63],
  [A4,2,.60],[Db5,1,.63],[B4,1,.61],
  [A4,4,.56],

  // ── Section B – emotional (32b) ──
  [E5,2,.73],[Gb5,1,.75],[E5,1,.71],
  [D5,2,.70],[Db5,2,.68],
  [B4,1,.65],[Db5,1,.68],[D5,1,.68],[E5,1,.71],
  [Db5,4,.68],
  [Gb5,2,.78],[E5,1,.73],[Gb5,1,.76],
  [E5,2,.74],[D5,1,.69],[Db5,1,.67],
  [B4,2,.64],[A4,2,.61],
  [A4,4,.57],

  // ── Section A'' – quiet return (32b) ──
  [Db5,1.5,.63],[B4,.5,.58],[A4,2,.60],
  [A4,1,.57],[B4,1,.60],[Db5,2,.64],
  [E5,2,.67],[Db5,2,.62],
  [B4,3,.59],[A4,1,.55],
  [A4,2,.56],[Db5,2,.60],
  [B4,2,.56],[A4,2,.52],
  [A4,2,.50],[Ab4,2,.47],
  [A4,8,.42],  // long fade
];

/* Chord arpeggio – I V vi IV in A major, 4 beats each */
const CHRD = [
  /* I  A  */ [[A3,Db4,E4],4], [[A3,E4,A4],4],
  /* V  E  */ [[E3,B3,E4],4],  [[E3,Ab3,B3],4],
  /* vi F#m*/ [[Gb3,A3,Db4],4],[[Gb3,Db4,Gb4],4],
  /* IV D  */ [[D4,Gb4,A4],4], [[D4,A4,D5],4],
  /* repeat */ [[A3,Db4,E4],4], [[A3,E4,A4],4],
  [[E3,B3,E4],4],  [[E3,Ab3,B3],4],
  [[Gb3,A3,Db4],4],[[Gb3,Db4,Gb4],4],
  [[D4,Gb4,A4],4], [[D4,A4,D5],4],
  [[A3,Db4,E4],4], [[A3,E4,A4],4],
  [[E3,B3,E4],4],  [[E3,Ab3,B3],4],
  [[Gb3,A3,Db4],4],[[Gb3,Db4,Gb4],4],
  [[D4,Gb4,A4],4], [[D4,A4,D5],4],
  [[A3,Db4,E4],4], [[A3,E4,A4],4],
  [[E3,B3,E4],4],  [[E3,Ab3,B3],4],
  [[Gb3,A3,Db4],4],[[Gb3,Db4,Gb4],4],
  [[D4,Gb4,A4],4], [[D4,A4,D5],4],
];

/* Bass notes, 4 beats each – matches chord roots */
const BASS = [
  [A2,4],[A2,4],[HZ.E3,4],[HZ.E3,4],
  [HZ.Gb3,4],[HZ.Gb3,4],[D4*.5,4],[D4*.5,4],
  [A2,4],[A2,4],[HZ.E3,4],[HZ.E3,4],
  [HZ.Gb3,4],[HZ.Gb3,4],[D4*.5,4],[D4*.5,4],
  [A2,4],[A2,4],[HZ.E3,4],[HZ.E3,4],
  [HZ.Gb3,4],[HZ.Gb3,4],[D4*.5,4],[D4*.5,4],
  [A2,4],[A2,4],[HZ.E3,4],[HZ.E3,4],
  [HZ.Gb3,4],[HZ.Gb3,4],[D4*.5,4],[D4*.5,4],
];

function playPiano(freq, t, dur, vol) {
  /* 4-oscillator piano: fundamental + harmonics */
  const master = actx.createGain();
  master.gain.setValueAtTime(0, t);
  master.gain.linearRampToValueAtTime(vol, t + .010);
  master.gain.setValueAtTime(vol * .60, t + .065);
  master.gain.exponentialRampToValueAtTime(vol * .24, t + Math.min(dur*.58, 2.0));
  master.gain.exponentialRampToValueAtTime(.0001, t + dur);

  const mkOsc = (f, type, gainVal, stopAt) => {
    const g = actx.createGain(); g.gain.value = gainVal;
    const o = actx.createOscillator(); o.type = type;
    o.frequency.value = f;
    o.connect(g); g.connect(master);
    o.start(t + (Math.random()-.5)*.006); // ±3ms humanize
    o.stop(t + stopAt + .06);
  };
  mkOsc(freq,    'triangle', 1.00, dur);
  mkOsc(freq*2,  'sine',     .085, Math.min(dur, 1.4));
  mkOsc(freq*3,  'sine',     .040, Math.min(dur, .8));
  mkOsc(freq*.5, 'sine',     .105, dur);

  master.connect(rev1); master.connect(rev2); master.connect(dG);
}

function playArp(notes, t, beats) {
  /* Rolling 8th-note arpeggio: low→mid→high→mid pattern */
  const eighth = B / 2;
  const pat = [0,1,2,1,0,1,2,1];
  pat.forEach((ni, i) => {
    const jitter = (Math.random()-.5) * .007; // humanize timing
    playPiano(notes[ni], t + i*eighth + jitter, eighth*.85,
              (.14 + Math.random()*.02) * (i===0 ? 1.1 : .85));
  });
}

function playBass(freq, t, dur) {
  const g = actx.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(.12, t + .03);
  g.gain.exponentialRampToValueAtTime(.04, t + dur*.6);
  g.gain.exponentialRampToValueAtTime(.0001, t + dur);
  const o = actx.createOscillator(); o.type = 'sine';
  o.frequency.value = freq;
  o.connect(g); g.connect(rev1); g.connect(dG);
  o.start(t); o.stop(t + dur + .06);
}

function schedAhead(until) {
  while (mT < until) {
    const [f, b, v] = MEL[mI % MEL.length];
    playPiano(f, mT, b*B*.86, v*.82 + (Math.random()-.5)*.025);
    mT += b*B; mI++;
  }
  while (cT < until) {
    const [notes, b] = CHRD[cI % CHRD.length];
    playArp(notes, cT, b);
    cT += b*B; cI++;
  }
  while (bT < until) {
    const [f, b] = BASS[bI % BASS.length];
    if (f > 10) playBass(f, bT, b*B);
    bT += b*B; bI++;
  }
}

function tick() { if (!playing) return; schedAhead(actx.currentTime + .7); sTimer = setTimeout(tick, 240); }

function mkRev(decay) {
  const c = actx.createConvolver();
  const len = Math.floor(actx.sampleRate * decay);
  const buf = actx.createBuffer(2, len, actx.sampleRate);
  for (let ch=0; ch<2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i=0; i<len; i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/len, 1.85);
  }
  c.buffer = buf; return c;
}

function startMusic() {
  if (playing) return;
  actx = new (window.AudioContext||window.webkitAudioContext)();
  mG = actx.createGain(); mG.gain.value = 0; mG.connect(actx.destination);
  // Fade in
  mG.gain.linearRampToValueAtTime(.74, actx.currentTime + 4);

  rev1 = mkRev(.9);  const rg1 = actx.createGain(); rg1.gain.value = .28;
  rev1.connect(rg1); rg1.connect(mG);
  rev2 = mkRev(3.4); const rg2 = actx.createGain(); rg2.gain.value = .20;
  rev2.connect(rg2); rg2.connect(mG);
  dG = actx.createGain(); dG.gain.value = .52; dG.connect(mG);

  const now = actx.currentTime + .2;
  mT = now; cT = now; bT = now; mI = cI = bI = 0;
  playing = true; tick();
  const b = document.getElementById('music-btn');
  b.textContent = '⏸'; b.classList.add('on');
}

function stopMusic() {
  playing = false; clearTimeout(sTimer);
  if (mG) mG.gain.setTargetAtTime(0, actx.currentTime, .4);
  setTimeout(() => { if (!playing && actx) { actx.close(); actx = null; } }, 700);
  const b = document.getElementById('music-btn');
  b.textContent = '♪'; b.classList.remove('on');
}
function toggleMusic() { playing ? stopMusic() : startMusic(); }
</script>
