<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>毕业快乐，Yunlin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0c0a08;
  --gold:     #c4a45a;
  --gold-l:   #e8d4a0;
  --gold-d:   #8a6c2e;
  --cream:    #f8edd8;
  --paper:    #faf7ef;
  --ink:      #1e1409;
  --ink-m:    #4a3520;
  --seal:     #8f1d1d;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: 'Noto Serif SC', 'Songti SC', 'STSong', serif;
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
}

/* ─── BOKEH CANVAS ─── */
#bokeh {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}

/* ─── SCENE WRAPPER ─── */
.scene {
  position: fixed; inset: 0; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 0.9s ease;
}
.scene.hidden { opacity: 0; pointer-events: none; }

/* ─── ENVELOPE ─── */
#env-shell {
  position: relative;
  filter: drop-shadow(0 60px 100px rgba(0,0,0,0.8))
          drop-shadow(0 20px 40px rgba(0,0,0,0.6));
  cursor: pointer;
  transition: transform 0.4s ease;
}
#env-shell:hover { transform: translateY(-6px); }
#env-shell.is-open { cursor: default; pointer-events: none; }

.env-body {
  position: relative;
  width: 560px; height: 385px;
  background: linear-gradient(158deg, #f8edda 0%, #f1e0c2 55%, #e5cda0 100%);
  overflow: hidden;
  border-radius: 2px;
}

/* fold-shadow overlay via SVG */
.env-folds {
  position: absolute; inset: 0; z-index: 2; pointer-events: none;
}

/* content on envelope face */
.env-face {
  position: absolute; inset: 0; z-index: 3;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 0; text-align: center; padding: 28px;
}
.env-ornament {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px; letter-spacing: 18px;
  color: var(--gold-d); opacity: 0.7;
  margin-bottom: 10px;
}
.env-rule {
  width: 200px; height: 1px;
  background: linear-gradient(to right, transparent, var(--gold-d), transparent);
  opacity: 0.45; margin: 8px 0;
}
.env-yr {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px; letter-spacing: 6px;
  color: var(--ink-m); margin-top: 2px;
  font-weight: 300;
}
.env-title {
  font-size: 26px; letter-spacing: 10px;
  color: var(--ink); font-weight: 700;
  margin: 10px 0 4px;
}
.env-to {
  font-size: 11px; letter-spacing: 5px;
  color: var(--ink-m); margin-top: 14px;
  font-weight: 300;
}
.env-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 30px; font-style: italic;
  color: var(--ink); letter-spacing: 4px;
  font-weight: 300; margin-top: 4px;
}

/* wax seal */
.env-seal {
  position: absolute; bottom: 22px; right: 26px; z-index: 4;
  width: 52px; height: 52px; border-radius: 50%;
  background: radial-gradient(circle at 38% 32%,
    #e03030 0%, #a01818 45%, #6e0e0e 75%, #3a0808 100%);
  box-shadow: 0 3px 14px rgba(100,0,0,0.55),
              inset 0 1px 2px rgba(255,255,255,0.2),
              inset 0 -2px 5px rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.78);
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
}

/* envelope flap */
.env-flap-wrap {
  position: absolute; top: 0; left: 0; width: 560px; height: 210px;
  transform-origin: top center;
  z-index: 10;
  transition: transform 1.5s cubic-bezier(0.42, 0, 0.28, 1);
  filter: drop-shadow(0 6px 18px rgba(0,0,0,0.35));
}
#env-shell.is-open .env-flap-wrap {
  transform: perspective(1100px) rotateX(-178deg);
}

/* letter peek */
.env-letter-peek {
  position: absolute;
  top: 18px; left: 50%; z-index: 5;
  transform: translateX(-50%) translateY(110px);
  width: 500px; height: 310px;
  background: var(--paper);
  border-top: 1px solid rgba(180,150,90,0.2);
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  transition: transform 1.1s cubic-bezier(0.25,0.46,0.45,0.94) 1.05s,
              opacity   0.7s ease 1.0s;
}
.env-letter-peek span {
  font-size: 12px; letter-spacing: 5px; color: #a09080;
  font-weight: 300;
}
#env-shell.is-open .env-letter-peek {
  transform: translateX(-50%) translateY(-220px);
  opacity: 1;
}

/* open hint */
.open-hint {
  margin-top: 32px;
  font-size: 12px; letter-spacing: 5px;
  color: rgba(196,164,90,0.5);
  animation: breathe 2.8s ease-in-out infinite;
}
@keyframes breathe {
  0%,100% { opacity: 0.3; transform: translateY(0); }
  50%      { opacity: 0.85; transform: translateY(-6px); }
}

/* ─── LETTER SCENE ─── */
#scene-letter {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(8,6,4,0.97);
  overflow-y: auto; overflow-x: hidden;
  display: flex; justify-content: center;
  padding: 64px 20px 100px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.85s ease;
}
#scene-letter.show {
  opacity: 1; pointer-events: all;
}

.letter-paper {
  position: relative;
  width: 740px; max-width: 95vw;
  background: var(--paper);
  padding: 76px 84px 100px;
  box-shadow:
    0 0 0 1px rgba(190,160,100,0.12),
    0 80px 160px rgba(0,0,0,0.75),
    0 30px 60px rgba(0,0,0,0.5),
    0 8px 20px rgba(0,0,0,0.3);
  opacity: 0; transform: translateY(32px);
  transition: opacity 0.9s ease, transform 0.9s ease;
}
.letter-paper.show { opacity: 1; transform: translateY(0); }

/* double thin border */
.letter-paper::before {
  content: ''; position: absolute;
  top: 20px; left: 20px; right: 20px; bottom: 20px;
  border: 0.5px solid rgba(190,160,100,0.22);
  pointer-events: none;
}
.letter-paper::after {
  content: ''; position: absolute;
  top: 24px; left: 24px; right: 24px; bottom: 24px;
  border: 0.5px solid rgba(190,160,100,0.1);
  pointer-events: none;
}

/* letter header */
.ltr-head {
  text-align: center;
  padding-bottom: 32px;
  margin-bottom: 36px;
  border-bottom: 1px solid rgba(190,160,100,0.18);
}
.ltr-head-orn {
  display: block;
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px; letter-spacing: 20px;
  color: var(--gold-d); opacity: 0.6;
  margin-bottom: 14px;
}
.ltr-head-title {
  font-size: 22px; letter-spacing: 10px;
  font-weight: 700; color: var(--ink);
  margin-bottom: 8px;
}
.ltr-head-sub {
  font-size: 11px; letter-spacing: 3px;
  color: var(--ink-m); font-weight: 300;
  opacity: 0.75;
}

/* letter body text */
#ltr-body {
  font-size: 15.5px;
  line-height: 2.45;
  color: var(--ink);
  font-weight: 300;
}

/* text types */
.l-greeting {
  display: block;
  font-size: 17px; font-weight: 400;
  margin-bottom: 28px;
}
.l-p {
  display: block;
  text-indent: 2em;
  margin-bottom: 20px;
}
.l-poem {
  display: block;
  text-align: center; text-indent: 0;
  margin: 36px auto;
  font-size: 17px; line-height: 3.4;
  font-style: italic; color: #2e1e10;
  font-weight: 300;
}
.l-closing {
  display: block;
  text-align: right; text-indent: 0;
  margin-top: 36px;
  font-size: 17px; font-weight: 400;
}

/* character animation */
.c {
  display: inline-block;
  opacity: 0;
  transform: translateY(7px);
  transition: opacity 1.0s cubic-bezier(0.25,0.46,0.45,0.94),
              transform 1.0s cubic-bezier(0.25,0.46,0.45,0.94);
}
.c.v { opacity: 1; transform: none; }

/* ─── FOOTER: stamp + photo ─── */
#ltr-footer {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-top: 60px;
  opacity: 0;
  transition: opacity 0.8s ease;
}
#ltr-footer.show { opacity: 1; }

/* stamp */
#stamp {
  width: 100px; height: 100px; border-radius: 50%;
  background: radial-gradient(circle at 38% 32%,
    #d43030 0%, #961515 45%, #650e0e 75%, #380808 100%);
  border: 2px solid rgba(180,40,40,0.65);
  box-shadow: 0 0 0 1px rgba(180,40,40,0.25),
              0 6px 24px rgba(100,0,0,0.55),
              inset 0 1px 2px rgba(255,255,255,0.18);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: rgba(255,255,255,0.85);
  transform: rotate(-16deg);
  text-align: center; line-height: 1.7;
  font-weight: 300;
  animation: stamp-drop 0.45s cubic-bezier(0.175,0.885,0.32,1.275) both;
  animation-play-state: paused;
}
#stamp.go { animation-play-state: running; }
@keyframes stamp-drop {
  0%   { transform: rotate(-16deg) scale(3.5); opacity: 0; }
  60%  { transform: rotate(-16deg) scale(0.88); opacity: 1; }
  80%  { transform: rotate(-16deg) scale(1.08); }
  100% { transform: rotate(-16deg) scale(1); }
}
.s-yr  { font-family: 'Cormorant Garamond', serif; font-size: 15px; letter-spacing: 1px; font-weight: 400; }
.s-txt { font-size: 10px; letter-spacing: 2.5px; opacity: 0.85; }
.s-dot { font-size: 13px; margin-top: 3px; opacity: 0.7; }

/* photo */
#photo-frame {
  position: relative; width: 188px;
  opacity: 0; transform: translateY(24px) rotate(2.8deg);
  transition: opacity 1s ease 0.5s, transform 1s ease 0.5s;
}
#photo-frame.show {
  opacity: 1; transform: translateY(0) rotate(2.8deg);
}

/* gold border */
#photo-frame::before {
  content: ''; position: absolute; inset: -11px; z-index: -1;
  background: linear-gradient(135deg,
    #b8903e 0%, #e8d070 30%, #c4a44a 50%, #e0c868 70%, #9a7830 100%);
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}
/* white inner mat */
#photo-frame::after {
  content: ''; position: absolute; inset: -3px; z-index: 0;
  background: var(--paper);
}

#photo-img {
  display: block; position: relative; z-index: 1;
  width: 100%; aspect-ratio: 2/3;
  object-fit: cover; object-position: center 12%;
}
.photo-cap {
  position: absolute; bottom: -28px; left: 50%;
  transform: translateX(-50%) rotate(-2.8deg);
  font-family: 'Cormorant Garamond', serif;
  font-size: 12px; letter-spacing: 3px;
  color: rgba(196,164,90,0.6); white-space: nowrap;
}

/* ─── MUSIC BUTTON ─── */
#music-btn {
  position: fixed; top: 22px; right: 22px; z-index: 200;
  width: 42px; height: 42px; border-radius: 50%;
  background: rgba(196,164,90,0.08);
  border: 1px solid rgba(196,164,90,0.22);
  color: rgba(196,164,90,0.6);
  font-size: 17px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(8px);
  transition: all 0.35s ease;
  font-family: inherit;
}
#music-btn:hover { background: rgba(196,164,90,0.16); color: var(--gold); }
#music-btn.on { color: var(--gold); border-color: rgba(196,164,90,0.5); background: rgba(196,164,90,0.14); }

/* ─── SCROLL HINT ─── */
#scroll-hint {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  z-index: 200; display: none;
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px; letter-spacing: 4px;
  color: rgba(196,164,90,0.42);
  animation: breathe 3s ease-in-out infinite;
}
#scroll-hint.show { display: block; }
</style>
</head>
<body>

<canvas id="bokeh"></canvas>

<!-- ENVELOPE SCENE -->
<div class="scene" id="scene-env">
  <div id="env-shell" onclick="openEnvelope()">

    <!-- body -->
    <div class="env-body">

      <!-- fold lines SVG -->
      <div class="env-folds">
        <svg width="560" height="385" viewBox="0 0 560 385" xmlns="http://www.w3.org/2000/svg">
          <line x1="0"   y1="0"   x2="280" y2="192" stroke="rgba(140,100,30,0.18)" stroke-width="1"/>
          <line x1="560" y1="0"   x2="280" y2="192" stroke="rgba(140,100,30,0.18)" stroke-width="1"/>
          <line x1="0"   y1="385" x2="280" y2="192" stroke="rgba(100,70,10,0.14)"  stroke-width="1"/>
          <line x1="560" y1="385" x2="280" y2="192" stroke="rgba(100,70,10,0.14)"  stroke-width="1"/>
        </svg>
      </div>

      <!-- front text -->
      <div class="env-face">
        <div class="env-ornament">✦ &nbsp; ✦ &nbsp; ✦</div>
        <div class="env-rule"></div>
        <div class="env-yr">二〇二六年</div>
        <div class="env-title">毕 业 纪 念</div>
        <div class="env-rule"></div>
        <div class="env-to">谨 呈</div>
        <div class="env-name">Yunlin</div>
      </div>

      <div class="env-seal">✦</div>
    </div>

    <!-- flap -->
    <div class="env-flap-wrap">
      <svg width="560" height="210" viewBox="0 0 560 210" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="fg" x1="50%" y1="0%" x2="50%" y2="100%">
            <stop offset="0%"   stop-color="#f0d898"/>
            <stop offset="100%" stop-color="#d8b450"/>
          </linearGradient>
          <filter id="fshadow">
            <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(0,0,0,0.25)"/>
          </filter>
        </defs>
        <polygon points="0,0 560,0 280,210" fill="url(#fg)" filter="url(#fshadow)"/>
        <line x1="1"   y1="0" x2="280" y2="209" stroke="rgba(160,115,25,0.22)" stroke-width="1.2"/>
        <line x1="559" y1="0" x2="280" y2="209" stroke="rgba(160,115,25,0.22)" stroke-width="1.2"/>
        <line x1="0"   y1="0" x2="560" y2="0"   stroke="rgba(160,115,25,0.12)" stroke-width="1"/>
      </svg>
    </div>

    <!-- letter peek inside -->
    <div class="env-letter-peek">
      <span>一 封 信 &nbsp;·&nbsp; 写 给 你</span>
    </div>

  </div>
  <p class="open-hint">▲ &ensp; 点击开启 &ensp; ▲</p>
</div>

<!-- LETTER SCENE -->
<div id="scene-letter">
  <div class="letter-paper">

    <div class="ltr-head">
      <span class="ltr-head-orn">❧ &nbsp; ❧ &nbsp; ❧</span>
      <div class="ltr-head-title">毕 业 纪 念</div>
      <div class="ltr-head-sub">二〇二六年五月十七日 &nbsp;·&nbsp; 谨以此信，赠予 Yunlin</div>
    </div>

    <div id="ltr-body"></div>

    <div id="ltr-footer">
      <div id="stamp">
        <div class="s-yr">2026</div>
        <div class="s-txt">毕业快乐</div>
        <div class="s-dot">✦</div>
      </div>

<script>
/* ═══ BOKEH PARTICLES ═══ */
const bv = document.getElementById('bokeh');
const bx = bv.getContext('2d');
let BP = [];

function initBokeh() {
  bv.width = innerWidth; bv.height = innerHeight;
  BP = Array.from({ length: 70 }, () => {
    const r = Math.random() * 22 + 4;
    return {
      x: Math.random() * bv.width,
      y: Math.random() * bv.height,
      r,
      vy: -(Math.random() * 0.18 + 0.04),
      vx: (Math.random() - 0.5) * 0.08,
      a: Math.random() * 0.18 + 0.04,
      ph: Math.random() * Math.PI * 2,
      sp: Math.random() * 0.006 + 0.002,
    };
  });
}

function drawBokeh() {
  bx.clearRect(0, 0, bv.width, bv.height);
  const t = Date.now() * 0.001;
  BP.forEach(p => {
    const alpha = p.a * (0.5 + 0.5 * Math.sin(t * p.sp * 60 + p.ph));
    const grd = bx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
    grd.addColorStop(0, `rgba(196,164,90,${alpha * 0.9})`);
    grd.addColorStop(0.4, `rgba(196,164,90,${alpha * 0.4})`);
    grd.addColorStop(1, 'rgba(196,164,90,0)');
    bx.beginPath();
    bx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    bx.fillStyle = grd;
    bx.fill();
    p.x += p.vx; p.y += p.vy;
    if (p.y + p.r < 0) { p.y = bv.height + p.r; p.x = Math.random() * bv.width; }
    if (p.x < -p.r || p.x > bv.width + p.r) p.x = Math.random() * bv.width;
  });
  requestAnimationFrame(drawBokeh);
}

addEventListener('resize', initBokeh);
initBokeh(); drawBokeh();

}

/* ═══ TEXT REVEAL ═══ */
const LETTER = [
  { type: 'greeting', text: '亲爱的 Yunlin，' },
  { type: 'p', text: '今天对你来说，是一个尤其重要的日子。' },
  { type: 'p', text: '我想，毕业从来都不只是"完成了一段学业"这么简单。它更像是，你终于走过了一段很长很长的路，回头看的时候，才发现自己已经翻过了那么多座山。' },
  { type: 'p', text: '这两年的时间，我看到过你悲伤无助的样子，看到过你痛苦挣扎的样子。我看你如何在痛苦中，一步一步，勇敢地往前走；看你一次次摇摆，却仍然选择回到自己的初心。我也和你一起，见证了你的成就，见证了你的喜悦，见证了你慢慢长成今天这个更坚定、更柔软，也更有力量的人。' },
  { type: 'p', text: '还记得你写下的那些"日记"。站在那个时间的窗口里，满眼都是绝望和悲伤，甚至不知道自己该怎样熬过那漫长的几个月。那时候的你，或许也不会想到，今天的你，真的会站在这里，穿着毕业袍，被爱包围着，带着笑意，迎接属于你的这一刻。' },
  { type: 'p', text: '所以今天，请一定要为自己骄傲。不是因为你"撑过来了"，而是因为你在那些最难的时候，没有放弃自己。' },
  { type: 'p', text: '你说，除了我，还有你的咨询师陪你走过了这艰难的时光。但其实，陪着你的，从来不只是我们。' },
  { type: 'p', text: '从最开始的痛苦无助，到慢慢开始尝试理解美国人，慢慢了解美国的 small talk，了解美国一些的文化，到更多地了解自己，这些都是你成长的印记，这些印记一直陪着你。' },
  { type: 'p', text: '它们不会消失。它们会留在你身上，陪着你往前走，提醒你，你曾经这样勇敢过。' },
  { type: 'p', text: '你认识了几十个来访，他们或让你一起落泪，或让你深刻共振，或让你久久记挂。你看着他们的蜕变，他们也见证着你的成长。你陪他们走过一段路，而他们，也以自己的方式，陪你走过了一段路。' },
  { type: 'p', text: '这些相遇，这些印记，这些你认真触碰过的生命，都会陪着你，走向更远的未来。' },
  { type: 'p', text: '未来的路还很长。去成为你想成为的大人，去找到更多的深刻链接，去体验更丰富的人生，去继续追逐你理想中的未来。' },
  { type: 'p', text: '同时也请记住，你也不用很急着去成为谁。你的存在本身，就已经很有意义。你的快乐，是最重要的事。' },
  { type: 'poem', text: '是流星赞美了黑夜，\n鲸鱼安慰了大海\n\n而你的存在，\n本身就是这个世界\n很美好的一部分。' },

];

function revealLetter() {
  const box = document.getElementById('ltr-body');
  let pi = 0, ci = 0, curEl = null;
  // queue of {span, delay}
  const queue = [];

  function buildQueue() {
    for (const sec of LETTER) {
      queue.push({ type: 'newblock', sec });
      for (let i = 0; i < sec.text.length; i++) {
        queue.push({ type: 'char', ch: sec.text[i], sec });
      }
      queue.push({ type: 'endblock', sec });
    }
    queue.push({ type: 'done' });
  }

  buildQueue();

  let qi = 0;
  let scheduledTime = performance.now();

  function scheduleNext() {
    if (qi >= queue.length) return;
    const item = queue[qi++];

    if (item.type === 'newblock') {
      const tag = item.sec.type === 'p' ? 'p' : 'span';
      curEl = document.createElement(tag);
      curEl.className = 'l-' + item.sec.type;
      box.appendChild(curEl);
      scheduleNext();
    } else if (item.type === 'endblock') {
      scheduledTime += item.sec.type === 'poem' ? 400 : 700;
      setTimeout(scheduleNext, scheduledTime - performance.now());
    } else if (item.type === 'done') {
      setTimeout(showFooter, 800);
    } else {
      // char
      const ch = item.ch;
      let delay = 78;
      if (ch === ' ') delay = 32;
      if ('，；：'.includes(ch)) delay = 260;
      if ('。！？'.includes(ch)) delay = 420;
      if ('\n'.includes(ch)) delay = 180;

      scheduledTime += delay;
      const targetTime = scheduledTime;

      setTimeout(() => {
        if (ch === '\n') {
          curEl.appendChild(document.createElement('br'));
        } else if (ch === ' ') {
          curEl.appendChild(document.createTextNode(' '));
        } else {
          const sp = document.createElement('span');
          sp.className = 'c';
          sp.textContent = ch;
          curEl.appendChild(sp);
          requestAnimationFrame(() => requestAnimationFrame(() => sp.classList.add('v')));
        }
        // scroll
        curEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        scheduleNext();
      }, Math.max(0, targetTime - performance.now()));
    }
  }

  scheduleNext();
}

function showFooter() {
  const f = document.getElementById('ltr-footer');
  f.classList.add('show');
  setTimeout(() => { document.getElementById('stamp').classList.add('go'); }, 300);
  setTimeout(() => { document.getElementById('photo-frame').classList.add('show'); }, 900);
  setTimeout(() => { document.getElementById('scroll-hint').classList.add('show'); }, 1800);
}

const MEL = [
  // A — tender opening (16b)
  [HZ.E5,2,.68],[HZ.D5,1,.62],[HZ.C5,1,.62],
  [HZ.A4,3,.64],[HZ.C5,1,.60],
  [HZ.B4,1,.62],[HZ.C5,1,.65],[HZ.D5,2,.65],
  [HZ.A4,4,.60],
  // A' — slight rise (16b)
  [HZ.A4,1,.62],[HZ.C5,1,.66],[HZ.E5,2,.70],
  [HZ.G5,2,.74],[HZ.E5,1,.68],[HZ.D5,1,.65],
  [HZ.C5,1,.67],[HZ.E5,1,.67],[HZ.G5,2,.72],
  [HZ.A5,4,.78],
  // B — emotional (16b)
  [HZ.G5,2,.73],[HZ.E5,1,.68],[HZ.F5,1,.68],
  [HZ.E5,2,.68],[HZ.D5,1.5,.64],[HZ.C5,.5,.60],
  [HZ.D5,2,.64],[HZ.B4,1,.59],[HZ.G4,1,.55],
  [HZ.A4,4,.56],
  // C — resolution (16b)
  [HZ.A4,1,.58],[HZ.C5,1,.62],[HZ.E5,2,.68],
  [HZ.E5,1,.64],[HZ.D5,1,.60],[HZ.C5,2,.62],
  [HZ.A4,2,.58],[HZ.G4,2,.52],
  [HZ.A4,4,.46],
  // Bridge (8b) — extra breath before loop
  [HZ.C5,2,.52],[HZ.E5,2,.55],
  [HZ.D5,2,.50],[HZ.A4,2,.45],
];

// Chord arpeggios  (16 chords × 4b = 64b, then padding 8b)
const CHD = [
  [[HZ.A3,HZ.E4,HZ.A4],4],[[HZ.A3,HZ.C4,HZ.E4],4],
  [[HZ.A3,HZ.E4,HZ.A4],4],[[HZ.A3,HZ.C4,HZ.E4],4],
  [[HZ.C4,HZ.G4,HZ.C5],4],[[HZ.C4,HZ.E4,HZ.G4],4],
  [[HZ.G3,HZ.D4,HZ.G4],4],[[HZ.G3,HZ.B3,HZ.D4],4],
  [[HZ.F3,HZ.C4,HZ.F4],4],[[HZ.F3,HZ.A3,HZ.C4],4],
  [[HZ.A3,HZ.E4,HZ.A4],4],[[HZ.A3,HZ.C4,HZ.E4],4],
  [[HZ.C4,HZ.G4,HZ.C5],4],[[HZ.C4,HZ.E4,HZ.G4],4],
  [[HZ.G3,HZ.D4,HZ.G4],4],[[HZ.E3,HZ.B3,HZ.E4],4],
  [[HZ.A3,HZ.E4,HZ.A4],4],[[HZ.F3,HZ.A3,HZ.C4],4],
];

// Bass notes (whole notes, one per 4 beats)
const BASS = [
  [HZ.A2,4],[HZ.A2,4],[HZ.A2,4],[HZ.A2,4],
  [HZ.C3,4],[HZ.C3,4],[HZ.G3,4],[HZ.G3,4],
  [HZ.F3,4],[HZ.F3,4],[HZ.A2,4],[HZ.A2,4],
  [HZ.C3,4],[HZ.C3,4],[HZ.G3,4],[HZ.E3,4],
  [HZ.A2,4],[HZ.F3,4],
];

function playNote(freq, t, dur, vol, isChord) {
  const g = actx.createGain();
  const atk = isChord ? 0.025 : 0.012;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + atk);
  g.gain.setValueAtTime(vol * (isChord ? 0.55 : 0.65), t + 0.09);
  g.gain.exponentialRampToValueAtTime(vol * 0.22, t + Math.min(dur * 0.6, 2.2));
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);

  // Main tone
  const o = actx.createOscillator();
  o.type = 'triangle'; o.frequency.value = freq;
  o.connect(g); o.start(t); o.stop(t + dur + 0.06);

  // Warm sub
  const g2 = actx.createGain(); g2.gain.value = isChord ? 0.07 : 0.12;
  const o2 = actx.createOscillator();
  o2.type = 'sine'; o2.frequency.value = freq * 0.5;
  o2.connect(g2); g2.connect(g);
  o2.start(t); o2.stop(t + dur + 0.06);

  // Gentle overtone
  const g3 = actx.createGain(); g3.gain.value = 0.045;
  const o3 = actx.createOscillator();
  o3.type = 'sine'; o3.frequency.value = freq * 2;
  o3.connect(g3); g3.connect(g);
  o3.start(t); o3.stop(t + Math.min(dur * 0.3, 0.3));

  g.connect(revNode);
  g.connect(dryG);
}

function playBass(freq, t, dur) {
  const g = actx.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.14, t + 0.04);
  g.gain.exponentialRampToValueAtTime(0.055, t + dur * 0.5);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  const o = actx.createOscillator();
  o.type = 'sine'; o.frequency.value = freq;
  o.connect(g); o.start(t); o.stop(t + dur + 0.06);
  g.connect(revNode); g.connect(dryG);
}

function schedAhead(until) {
  while (mT < until) {
    const [f,b,v] = MEL[mIdx % MEL.length];
    playNote(f, mT, b * B * 0.86, v * 0.84, false);
    mT += b * B; mIdx++;
  }
  while (cT < until) {
    const [freqs,b] = CHD[cIdx % CHD.length];
    freqs.forEach((f,i) => playNote(f, cT + i*0.06, b*B*0.72, 0.18, true));
    cT += b * B; cIdx++;
  }
  while (bT < until) {
    const [f,b] = BASS[bIdx % BASS.length];
    playBass(f, bT, b * B);
    bT += b * B; bIdx++;
  }
}

function tick() {
  if (!playing) return;
  schedAhead(actx.currentTime + 0.7);
  schedTimer = setTimeout(tick, 250);
}

function buildReverb() {
  const c = actx.createConvolver();
  const len = Math.floor(actx.sampleRate * 3.2);
  const buf = actx.createBuffer(2, len, actx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < len; i++)
      d[i] = (Math.random()*2-1) * Math.pow(1-i/len, 2.0);
  }
  c.buffer = buf; return c;
}

function startMusic() {
  if (playing) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  masterG = actx.createGain(); masterG.gain.value = 0.74;
  masterG.connect(actx.destination);
  revNode = buildReverb();
  reverbG = actx.createGain(); reverbG.gain.value = 0.62;
  revNode.connect(reverbG); reverbG.connect(masterG);
  dryG = actx.createGain(); dryG.gain.value = 0.40; dryG.connect(masterG);
  const now = actx.currentTime + 0.18;
  mT = now; cT = now; bT = now; mIdx = cIdx = bIdx = 0;
  playing = true; tick();
  const btn = document.getElementById('music-btn');
  btn.textContent = '⏸'; btn.classList.add('on');
}

function stopMusic() {
  playing = false; clearTimeout(schedTimer);
  if (masterG) masterG.gain.setTargetAtTime(0, actx.currentTime, 0.4);
  setTimeout(() => { if (!playing && actx) { actx.close(); actx = null; } }, 700);
  const btn = document.getElementById('music-btn');
  btn.textContent = '♪'; btn.classList.remove('on');
}

function toggleMusic() { playing ? stopMusic() : startMusic(); }
</script>
</body>
</html>
